name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: MelvinJoshua1375
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=a9fef7&color_dots[]=0d1b2a&color_dots[]=1a1a3e&color_dots[]=2a2a5e&color_dots[]=3a3a8e&color_dots[]=a9fef7

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
